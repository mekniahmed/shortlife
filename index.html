<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vh 2vw;
        }

        .video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            opacity: 0.3;
        }

        .glitch {
            font-size: clamp(1.5em, 5vw, 3em);
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 #f00, -0.03em -0.04em 0 #0ff,
                         0.025em 0.04em 0 #ff0;
            animation: glitch 725ms infinite;
            margin-bottom: 2vh;
            text-align: center;
        }

        .crew-tag {
            font-size: clamp(1.2em, 4vw, 2.5em);
            color: #0f0;
            text-align: center;
            margin-bottom: 3vh;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
            letter-spacing: 0.15em;
            padding: 0 1vw;
        }

        .palestine {
            font-size: clamp(2em, 6vw, 4em);
            font-weight: bold;
            color: #fff;
            text-align: center;
            margin: 3vh 0;
            text-shadow: 0 0 20px #f00, 0 0 40px #0f0;
            animation: pulse 2s infinite;
        }

        .terminal {
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 5px;
            padding: 2vh 2vw;
            max-width: 90vw;
            width: 700px;
            margin: 2vh 0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .terminal-header {
            color: #0f0;
            margin-bottom: 1.5vh;
            font-size: clamp(0.9em, 2vw, 1.2em);
            text-align: center;
        }

        .terminal-line {
            margin: 1vh 0;
            color: #0f0;
            font-size: clamp(0.7em, 1.5vw, 1em);
            word-wrap: break-word;
        }

        .terminal-line::before {
            content: '> ';
            color: #f00;
        }

        .credits {
            background: rgba(20, 0, 0, 0.9);
            border: 2px solid #f00;
            border-radius: 5px;
            padding: 2.5vh 2vw;
            max-width: 90vw;
            width: 600px;
            margin: 3vh 0;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .credits-title {
            color: #f00;
            font-size: clamp(1em, 2.5vw, 1.5em);
            margin-bottom: 1.5vh;
            text-align: center;
            text-shadow: 0 0 10px #f00;
        }

        .credits-list {
            color: #0ff;
            font-size: clamp(0.9em, 2vw, 1.3em);
            text-align: center;
            line-height: 1.8;
        }

        .skull {
            font-size: clamp(2em, 8vw, 5em);
            text-align: center;
            margin: 2vh 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes glitch {
            0% {
                text-shadow: 0.05em 0 0 #f00, -0.03em -0.04em 0 #0ff,
                             0.025em 0.04em 0 #ff0;
            }
            15% {
                text-shadow: 0.05em 0 0 #f00, -0.03em -0.04em 0 #0ff,
                             0.025em 0.04em 0 #ff0;
            }
            16% {
                text-shadow: -0.05em -0.025em 0 #f00, 0.025em 0.035em 0 #0ff,
                             -0.05em -0.05em 0 #ff0;
            }
            49% {
                text-shadow: -0.05em -0.025em 0 #f00, 0.025em 0.035em 0 #0ff,
                             -0.05em -0.05em 0 #ff0;
            }
            50% {
                text-shadow: 0.05em 0.035em 0 #f00, 0.03em 0 0 #0ff,
                             0 -0.04em 0 #ff0;
            }
            99% {
                text-shadow: 0.05em 0.035em 0 #f00, 0.03em 0 0 #0ff,
                             0 -0.04em 0 #ff0;
            }
            100% {
                text-shadow: -0.05em 0 0 #f00, -0.025em -0.04em 0 #0ff,
                             -0.04em -0.025em 0 #ff0;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 0, 0.05) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 0 100%;
            }
        }

        /* Mobile & Small Screen Optimizations */
        @media (max-width: 768px) {
            .container {
                padding: 1vh 3vw;
            }
            
            .terminal, .credits {
                padding: 1.5vh 3vw;
            }
            
            .crew-tag {
                letter-spacing: 0.1em;
            }
        }

        /* Ultra-wide screen support */
        @media (min-width: 1920px) {
            .terminal, .credits {
                max-width: 40vw;
            }
        }

        .redirect-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #0f0;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: clamp(0.7em, 1.5vw, 0.95em);
            padding: 8px 20px;
            border-radius: 4px;
            z-index: 100;
            text-align: center;
            letter-spacing: 0.1em;
            box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }
    </style>
</head>

    <script>
        // Matrix rain effect - Optimized for all screens
        const canvas = document.querySelector('.matrix');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();

        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01';
        const fontSize = 14;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = Array(columns).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        window.addEventListener('resize', () => {
            resizeCanvas();
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(1);
        });

        // Countdown redirect
        let timeLeft = 10;
        const countdownEl = document.getElementById('countdown');
        const redirectURL = 'https://mekniahmed.github.io/shortlife/';

            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = redirectURL;
            }
        }, 1000);
